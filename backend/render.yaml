# Render Blueprint - Backend Service Configuration
# This file defines how your backend will be deployed on Render
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: flowauxi-backend
    runtime: docker
    region: singapore # Choose region closest to your users (oregon, frankfurt, singapore, ohio)

    # Build & Deploy Settings
    rootDir: backend
    dockerfilePath: ./Dockerfile.web
    dockerCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 50 --log-level info --access-logfile - --error-logfile -

    # Instance Type (free tier available)
    plan: free # Options: free, starter, standard, pro

    # Health Check
    healthCheckPath: /api/health

    # Environment Variables (set these in Render Dashboard)
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        sync: false # Set in dashboard (your Vercel frontend URL)
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: REDIS_URL
        sync: false # Set in dashboard (Redis Cloud connection string)
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false # Set in dashboard (JSON service account key)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false # Razorpay Dashboard > Webhooks > Secret
      - key: ADMIN_API_KEY
        sync: false # For /api/admin/billing/* endpoints
      - key: FILES_TOOLS_ENABLED
        value: true
      - key: FILES_TEXT_TO_PDF_ENABLED
        value: true
      - key: FILES_IMAGE_CONVERTER_ENABLED
        value: true
      - key: FILES_OCR_ENABLED
        value: true
      - key: FILES_OCR_INLINE_DEV_WORKERS
        value: true
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: OCR_DEFAULT_LANGUAGE_MODE
        value: auto
      - key: FILES_VIDEO_CONVERTER_ENABLED
        value: true
      - key: FILE_TOOLS_STORAGE_PROVIDER
        value: cloudinary
      - key: FILE_TOOLS_STORAGE_HEALTH_PROBE
        value: write
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FILE_TOOLS_CLOUDINARY_DELIVERY_TYPE
        value: authenticated
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET_NAME
        sync: false

  - type: web
    name: flowauxi-voice-agents
    runtime: docker
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile.web
    dockerCommand: uvicorn agents_app:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 10
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: FRONTEND_INTERNAL_BASE_URL
        sync: false
      - key: VOICE_BOOKING_WRITES_ENABLED
        value: true

  # Celery Worker for Background Tasks (Google Sheets sync, notifications, etc.)
  # Also runs beat scheduler (--beat flag) for periodic billing monitor tasks
  - type: worker
    name: flowauxi-celery-worker
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_app worker --beat --loglevel=info --concurrency=2 -Q high,default,low
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OTP_FROM_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

  - type: worker
    name: flowauxi-video-ingest-worker
    runtime: docker
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile.video
    dockerCommand: celery -A celery_app worker --loglevel=info -Q video_ingest --concurrency=2 --prefetch-multiplier=1
    plan: starter
    envVars:
      - key: FLASK_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FILES_TOOLS_ENABLED
        value: true
      - key: FILES_VIDEO_CONVERTER_ENABLED
        value: true
      - key: FILE_TOOLS_STORAGE_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FILE_TOOLS_CLOUDINARY_DELIVERY_TYPE
        value: authenticated
      - key: FFMPEG_BINARY
        value: /usr/bin/ffmpeg
      - key: FFPROBE_BINARY
        value: /usr/bin/ffprobe

  - type: worker
    name: flowauxi-video-worker
    runtime: docker
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile.video
    dockerCommand: celery -A celery_app worker --loglevel=info -Q video --concurrency=1 --prefetch-multiplier=1
    plan: starter
    envVars:
      - key: FLASK_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FILES_TOOLS_ENABLED
        value: true
      - key: FILES_VIDEO_CONVERTER_ENABLED
        value: true
      - key: FILE_TOOLS_STORAGE_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FILE_TOOLS_CLOUDINARY_DELIVERY_TYPE
        value: authenticated
      - key: FFMPEG_BINARY
        value: /usr/bin/ffmpeg
      - key: FFPROBE_BINARY
        value: /usr/bin/ffprobe
      - key: FILE_TOOLS_VIDEO_CONVERSION_SOFT_TIME_LIMIT
        value: 5400
      - key: FILE_TOOLS_VIDEO_CONVERSION_TIME_LIMIT
        value: 5700
